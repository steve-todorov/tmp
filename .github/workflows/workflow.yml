# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  # Defines workflow parameters for manual execution.
  workflow_call:
    inputs:
      MAIN_CODE_BRANCH:
        default: 'master'
        required: false
        type: string
      PYCAPT_BRANCH:
        default: 'master'
        required: false
        type: string
      QA_INTEGRATION_TESTS_BRANCH:
        default: 'master'
        required: false
        type: string
      LIBDEV_BRANCH:
        default: 'default'
        required: false
        type: string
      USE_LIBDEV_CACHE:
        default: false
        required: false
        type: boolean
        description: "Use existing libdev (for build debugging purposes only!)"
      APP_MAJOR:
        default: 5
        required: false
        type: number
      APP_MINOR:
        default: 7
        required: false
        type: number
      APP_RELEASE:
        default: 0
        required: false
        type: number
      RUN_QA_INTEGRATION_TESTS:
        default: true
        required: false
        type: boolean

env: 
  revisionId: "${{ github.sha }}"
  buildNumber: "${{ github.run_number }}"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: | 
          echo "${{ env.revisionId }}" > example.txt
          echo "${{ env.buildNumber }}" >> example.txt
          export >> example.txt
        
      - name: Display
        run: cat example.txt
        
